<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"><style>@keyframes cdlspin{to{transform:rotate(360deg)}}@keyframes cdlpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}@keyframes cdlshake{0%{transform:translate(0,0) rotate(0deg)}2%{transform:translate(-2px,1px) rotate(-2deg)}4%{transform:translate(2px,-1px) rotate(2deg)}6%{transform:translate(-2px,-1px) rotate(-1.6deg)}8%{transform:translate(2px,1px) rotate(1.6deg)}10%{transform:translate(-1px,1px) rotate(-1deg)}12%,100%{transform:translate(0,0) rotate(0deg)}}#shake{transform-box:fill-box;transform-origin:center;animation:cdlshake 3s ease-in-out infinite}#orbit{transform-box:fill-box;transform-origin:center;animation:cdlspin 16s linear infinite}#core{transform-box:fill-box;transform-origin:center;animation:cdlpulse 3s ease-in-out infinite}@media (prefers-reduced-motion:reduce){#shake,#orbit,#core{animation:none}}</style><defs><radialGradient id="core" cx="35%" cy="30%" r="75%"><stop offset="0" stop-color="#ffffff"/><stop offset="0.72" stop-color="#e0a32e"/></radialGradient><filter id="blur" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="5"/></filter><radialGradient id="bgg" cx="50%" cy="40%" r="75%"><stop offset="0" stop-color="#1c2230"/><stop offset="1" stop-color="#0b0d11"/></radialGradient></defs><rect width="200" height="200" rx="44" fill="url(#bgg)"/><g id="shake"><g transform="translate(100,100) scale(0.9067)"><path d="M -59 -52 L -72 -52 L -72 52 L -59 52" fill="none" stroke="#f0c45a" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/><path d="M 59 -52 L 72 -52 L 72 52 L 59 52" fill="none" stroke="#f0c45a" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/><g id="orbit"><g transform="rotate(0)"><ellipse rx="46" ry="15" fill="none" stroke="#54d98c" stroke-opacity="0.95" stroke-width="2.4"/><circle r="4.6" fill="#54d98c"><animateMotion dur="3s" repeatCount="indefinite" path="M 46,0 A 46,15 0 1,1 -46,0 A 46,15 0 1,1 46,0"/></circle></g><g transform="rotate(60)"><ellipse rx="46" ry="15" fill="none" stroke="#3fd6d6" stroke-opacity="0.9" stroke-width="2.4"/><circle r="4.6" fill="#3fd6d6"><animateMotion dur="3.8s" repeatCount="indefinite" path="M 46,0 A 46,15 0 1,1 -46,0 A 46,15 0 1,1 46,0"/></circle></g><g transform="rotate(120)"><ellipse rx="46" ry="15" fill="none" stroke="#7af0c0" stroke-opacity="0.72" stroke-width="2.4"/><circle r="4.6" fill="#7af0c0"><animateMotion dur="4.6s" repeatCount="indefinite" path="M 46,0 A 46,15 0 1,1 -46,0 A 46,15 0 1,1 46,0"/></circle></g></g><g id="core"><circle r="16" fill="#f0c45a" opacity="0.5" filter="url(#blur)"/><circle r="11" fill="url(#core)"/></g></g></g></svg>
